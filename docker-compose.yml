version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: forense_ai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: forense_ai
      POSTGRES_USER: forense_app
      POSTGRES_PASSWORD: dev_only_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forense_app -d forense_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: forense_ai_pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@forense.local
      PGADMIN_DEFAULT_PASSWORD: dev_only_password
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
